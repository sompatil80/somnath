{% extends "layout.html" %}

{% block content %}

<h2>Assign Task</h2>

<form method="POST">

    <div class="mb-3">

        <label>Student</label>

        <select name="student_id" class="form-control">

            {% for student in students %}

            <option value="{{ student.student_id }}">

                {{ student.first_name }} {{ student.last_name }}

            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">

        <label>Maximum Marks</label>
        <input
            type="number"
            name="max_marks"
            class="form-control"
            required
        />
    </div>

    <button 
        type="submit" 
        class="btn btn-primary"
    >
        Save Task
    </button>

</form>

{% endblock %}
